<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Ahorcado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="container text-center mt-5">
        <h1>Juego del Ahorcado</h1>
        <p class="lead">¡Pon a prueba tu vocabulario y salva al personaje!</p>
        <div class="d-grid gap-3 col-6 mx-auto">
            <button class="btn btn-primary" onclick="startGame()">Jugar</button>
            <button class="btn btn-secondary" onclick="showOptions()">Opciones</button>
            <button class="btn btn-danger" onclick="exitGame()">Salir</button>
        </div>
    </div>

    <script>
        function startGame() {
            window.location.href = './ahorcado.html'; 
        }

        function showOptions() {
            alert("Opciones próximamente disponibles.");
        }

        function exitGame() {
            alert("¡Gracias por jugar! Nos vemos pronto.");
        }
    </script>
</body>
</html>
